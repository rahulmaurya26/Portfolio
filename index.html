<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://smtpjs.com/v3/smtp.js"></script>
    <title>Login-Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            background: linear-gradient(30870deg, #6580fc, #27b5f2, rgb(238, 120, 120), rgb(247, 203, 9), red), aqua;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .wrapper {
            width: 90%;
            max-width: 400px;
            background-color: rgba(118, 99, 243, 0.22);
            color: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0px 3px 15px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .wrapper h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .login-input {
            width: 100%;
            height: 45px;
            margin: 10px 0;
            border: none;
            outline: none;
            border-radius: 25px;
            font-size: 16px;
            text-align: center;
            border: 1px solid #333;
        }

        .remember {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin: 10px 0;
        }

        .remember a {
            color: red;
            text-decoration: none;
        }

        .button {
            width: 100%;
            height: 45px;
            background: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        .button:hover {
            background-color: green;
            color: white;
        }

        .toggle-button {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .toggle-button button {
            width: 48%;
            height: 40px;
            border-radius: 20px;
            border: none;
            font-size: 16px;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="wrapper" id="user-wrapper">
        <div class="toggle-button">
            <button disabled>USER</button>
            <button id="switch-to-admin">ADMIN</button>
        </div>
        <h1>User Login</h1>
        <form action="user.php" method="post">
            <input type="text" placeholder="Username" name="user_name" class="login-input" required>
            <input type="password" placeholder="Password" name="password" class="login-input" required>
            <div class="remember">
                <label><input type="checkbox"> Remember Me</label>
                <a href="forgetpassword.html">Forgot Password?</a>
            </div>
            <button type="submit" class="button">Login</button>
            <p>Don't have an account? <a href="registration.html">Register</a></p>
        </form>
    </div>

    <div class="wrapper hidden" id="admin-wrapper">
        <div class="toggle-button">
            <button id="switch-to-user">USER</button>
            <button disabled>ADMIN</button>
        </div>
        <h1>Admin Login</h1>
        <form action="admin.php" method="post">
            <input type="text" placeholder="Username" name="admin_name" class="login-input" required>
            <input type="password" placeholder="Password" name="password" class="login-input" required>
            <div class="remember">
                <label><input type="checkbox"> Remember Me</label>
                <a href="#">Forgot Password?</a>
            </div>
            <button type="submit" class="button">Login</button>
        </form>
    </div>

    <script>
        document.getElementById("switch-to-admin").addEventListener("click", function () {
            document.getElementById("user-wrapper").classList.add("hidden");
            document.getElementById("admin-wrapper").classList.remove("hidden");
        });

        document.getElementById("switch-to-user").addEventListener("click", function () {
            document.getElementById("admin-wrapper").classList.add("hidden");
            document.getElementById("user-wrapper").classList.remove("hidden");
        });
    </script>
</body>
</html>
